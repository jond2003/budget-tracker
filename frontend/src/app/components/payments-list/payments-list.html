<table>
  <tr class="border">
    <th class="p-2">Name</th>
    <th class="p-2">Category</th>
    <th class="p-2">Amount</th>
    @if (showDate()) { <th class="p-2">Date</th> }
  </tr>
  @for (t of payments(); track $index) {
    <tr class="border">
      <td class="p-2">{{ t.label }}</td>
      <td class="p-2">{{ categories().find(v => v._id == t.category_id)?.name }}</td>
      <td class="p-2">£{{ t.amount }}</td>
      @if (showDate()) { <td class="p-2">{{ t.payment_date | date }}</td> }
    </tr>
  }
  <tr class="border font-bold">
    <td class="p-2">Total</td>
    <td class="p-2"></td>
    <td class="p-2">£{{ totalAmount() }}</td>
  </tr>
</table>
